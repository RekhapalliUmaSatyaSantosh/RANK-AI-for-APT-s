{% extends 'base.html' %}
{% load static %}
{% block contents %}
<style>
    /* Full-page background */
    .content {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-image: url('{{ MEDIA_URL }}background.jpg'); /* Add a nice background */
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        padding: 20px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* Form container */
    .form-container {
        background: rgba(255, 255, 255, 0.95);
        padding: 40px 30px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        width: 100%;
        max-width: 450px;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .form-container:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
    }

    /* Form heading */
    .form-container h2 {
        text-align: center;
        font-size: 28px;
        color: #007bff;
        margin-bottom: 25px;
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
    }

    /* Input fields */
    .form-group input,
    .form-group textarea {
        width: 100%;
        padding: 12px 15px;
        margin-bottom: 18px;
        border: 1px solid #ccc;
        border-radius: 8px;
        outline: none;
        transition: border-color 0.3s ease, box-shadow 0.3s ease;
        font-size: 14px;
    }

    .form-group input:focus,
    .form-group textarea:focus {
        border-color: #007bff;
        box-shadow: 0 0 5px rgba(0, 123, 255, 0.5);
    }

    /* Buttons */
    .btn-block {
        width: 100%;
        padding: 12px;
        font-weight: 600;
        border-radius: 8px;
        transition: background-color 0.3s ease, transform 0.2s ease;
        font-size: 16px;
    }

    .btn-primary {
        background-color: #007bff;
        border: none;
        color: #fff;
    }

    .btn-primary:hover {
        background-color: #0056b3;
        transform: translateY(-2px);
    }

    /* Messages */
    .messages {
        text-align: center;
        margin-bottom: 20px;
    }

    .messages .message {
        padding: 10px 15px;
        border-radius: 8px;
        margin-bottom: 10px;
        font-size: 14px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .messages .success {
        background-color: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
    }

    .messages .error {
        background-color: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
    }

    /* Responsive adjustments */
    @media (max-width: 500px) {
        .form-container {
            padding: 30px 20px;
        }

        .form-container h2 {
            font-size: 24px;
        }
    }
</style>

<div class="content">
    <div class="form-container">
        <h2>User Registration Form</h2>

        <!-- Messages -->
        <div class="messages">
            {% if messages %}
                {% for message in messages %}
                    <div class="message {% if message.tags %}{{ message.tags }}{% endif %}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        </div>

        <form action="{% url 'UserRegisterForm' %}" method="post">
            {% csrf_token %}
            <div class="form-group">
                <input type="text" class="form-control" name="name" maxlength="100" placeholder="Full Name" required>
            </div>
            <div class="form-group">
                <input type="text" class="form-control" name="loginid" maxlength="100" placeholder="Login ID" required>
            </div>
            <div class="form-group">
                <input type="password" class="form-control" name="password" maxlength="100" placeholder="Password" required>
            </div>
            <div class="form-group">
                <input type="text" class="form-control" name="mobile" maxlength="10" placeholder="Mobile Number" required>
            </div>
            <div class="form-group">
                <input type="email" class="form-control" name="email" maxlength="100" placeholder="Email" required>
            </div>
            <div class="form-group">
                <input type="text" class="form-control" name="locality" maxlength="100" placeholder="Locality">
            </div>
            <div class="form-group">
                <textarea class="form-control" name="address" maxlength="1000" rows="4" placeholder="Address"></textarea>
            </div>
            <div class="form-group">
                <input type="text" class="form-control" name="city" maxlength="100" placeholder="City">
            </div>
            <div class="form-group">
                <input type="text" class="form-control" name="state" maxlength="100" placeholder="State">
            </div>

            <button type="submit" class="btn btn-primary btn-block">Register</button>
        </form>
    </div>
</div>
{% endblock %}
